name: rumil_codec_builder
description: >-
  Code generator for rumil_codec: derives BinaryCodec implementations
  for annotated classes and sealed class hierarchies.
version: 0.1.0
repository: https://github.com/hakimjonas/rumil-dart
topics:
  - codec
  - code-generation
  - build-runner

environment:
  sdk: ^3.7.0

dependencies:
  build: ">=3.0.0 <5.0.0"
  source_gen: ^4.0.0
  analyzer: ">=7.0.0 <13.0.0"
  rumil_codec: ^0.1.0

dev_dependencies:
  build_runner: ">=2.4.0 <3.0.0"
  build_test: ^3.5.0
  test: ^1.25.0
  lints: ^6.0.0
